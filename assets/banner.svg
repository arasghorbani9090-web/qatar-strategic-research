<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1d3a"/>
      <stop offset="50%" stop-color="#1a3a6b"/>
      <stop offset="100%" stop-color="#8a1538"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- abstract road-network / data-graph motif -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.12" fill="none">
    <path d="M 0 80  Q 200 60 400 100 T 800 90 T 1200 110"/>
    <path d="M 0 140 Q 300 130 600 170 T 1200 150"/>
    <path d="M 0 200 Q 250 180 500 220 T 1000 200 T 1200 230"/>
    <path d="M 0 260 Q 200 240 400 280 T 800 270 T 1200 290"/>
  </g>

  <!-- node points along curves (data-graph aesthetic) -->
  <g fill="#d4af37" opacity="0.6">
    <circle cx="120" cy="78" r="3"/>
    <circle cx="340" cy="92" r="3"/>
    <circle cx="560" cy="148" r="3"/>
    <circle cx="780" cy="93" r="3"/>
    <circle cx="980" cy="208" r="3"/>
    <circle cx="200" cy="262" r="3"/>
    <circle cx="640" cy="178" r="3"/>
    <circle cx="880" cy="270" r="3"/>
  </g>

  <!-- accent vertical bar -->
  <rect x="56" y="80" width="6" height="160" fill="url(#accent)"/>

  <!-- title -->
  <text x="92" y="138" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="56" fill="#ffffff" letter-spacing="-1">Qatar Strategic Research</text>

  <!-- subtitle -->
  <text x="92" y="178" font-family="Helvetica, Arial, sans-serif" font-weight="300" font-size="22" fill="#e8e8e8" letter-spacing="0.2">Transportation · Innovation Ecosystem · Policy Landscape</text>

  <!-- tagline -->
  <text x="92" y="222" font-family="Helvetica, Arial, sans-serif" font-weight="400" font-size="16" fill="#d4af37" filter="url(#glow)">Independent applied research · Doha · Open data · Reproducible methods</text>

  <!-- right-side metric badges -->
  <g transform="translate(820, 84)" font-family="Helvetica, Arial, sans-serif">
    <rect x="0" y="0" width="320" height="44" rx="22" fill="rgba(255,255,255,0.08)" stroke="rgba(212,175,55,0.4)" stroke-width="1"/>
    <text x="20" y="28" font-size="14" fill="#ffffff" font-weight="500">30+ Qatar institutional papers indexed</text>

    <rect x="0" y="56" width="320" height="44" rx="22" fill="rgba(255,255,255,0.08)" stroke="rgba(212,175,55,0.4)" stroke-width="1"/>
    <text x="20" y="84" font-size="14" fill="#ffffff" font-weight="500">9 government strategy documents synthesized</text>

    <rect x="0" y="112" width="320" height="44" rx="22" fill="rgba(255,255,255,0.08)" stroke="rgba(212,175,55,0.4)" stroke-width="1"/>
    <text x="20" y="140" font-size="14" fill="#ffffff" font-weight="500">10 research gaps with scored recommendations</text>
  </g>
</svg>
